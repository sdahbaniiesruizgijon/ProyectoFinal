<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mis Vehículos</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
    <div class="container" sec:authorize="hasRole('CLIENTE')">
        <header>
            <h1>Mis Adquisiciones</h1>
            <a th:href="@{/vehiculos}" class="btn-edit">Volver al Catálogo</a>
        </header>

        <h3>Mis Compras (Historial)</h3>
        
        <div th:if="${#lists.isEmpty(pedidos)}" class="card" style="padding: 20px; text-align: center; color: var(--text-muted);">
            <p>Todavía no has realizado ninguna compra.</p>
        </div>

        <div th:if="${!#lists.isEmpty(pedidos)}" class="card-grid">
            <div th:each="p : ${pedidos}" class="card">
                <div class="card-content">
                    <h3 th:text="${p.vehiculo.marca + ' ' + p.vehiculo.modelo}"></h3>
                    <p>Fecha: <span th:text="${#temporals.format(p.fecha, 'dd-MM-yyyy')}"></span></p>
                    <span class="tag tag-vendido">Comprado</span>
                </div>
            </div>
        </div>

        <h3 style="margin-top: 40px;">Alquileres Activos</h3>
        
        <div th:if="${#lists.isEmpty(alquileres)}" class="card" style="padding: 20px; text-align: center; color: var(--text-muted);">
            <p>No tienes alquileres activos en este momento.</p>
        </div>

        <div th:if="${!#lists.isEmpty(alquileres)}" class="card-grid">
            <div th:each="a : ${alquileres}" class="card">
                <div class="card-content">
                    <h3 th:text="${a.vehiculo.marca + ' ' + a.vehiculo.modelo}"></h3>
                    <p>Fin: <span th:text="${a.fechaFin}"></span></p>

                    <div th:if="${a.multa > 0}" style="margin: 10px 0; padding: 10px; background-color: #fce4e4; border: 1px solid #f5c6cb; border-radius: 5px;">
                        <p style="color: #721c24; font-weight: bold; margin: 0;">⚠ ¡Plazo excedido!</p>
                        <p style="color: #721c24; margin: 0;">
                            Multa total: <span th:text="${#numbers.formatDecimal(a.multa, 1, 2)}">0.00</span>€
                        </p>
                    </div>
                    
                    <div class="card-actions" style="margin-top: 10px;">
                        <form th:if="${!a.devuelto}" th:action="@{/vehiculos/devolver/{idAlquiler}(idAlquiler=${a.id})}" method="post" style="width: 100%;">
                            <button type="submit" class="btn-delete" style="background-color: #27ae60; color: white; width: 100%;">Devolver Coche</button>
                        </form>
                        <span th:if="${a.devuelto}" class="tag" style="background-color: gray; color: white;">Ya Devuelto</span>
                    </div>
                </div>
            </div>
        </div>
    </div> </body>
</html>
